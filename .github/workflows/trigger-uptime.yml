name: Trigger Uptime
on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Uptime Check
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"uptime"}'
